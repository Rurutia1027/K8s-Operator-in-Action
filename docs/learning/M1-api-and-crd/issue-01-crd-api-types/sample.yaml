apiVersion: compute.cloud.com/v1
kind: Ec2Instance
metadata:
  name: ec2instance-sample
  namespace: default
  labels:
    app.kubernetes.io/name: ec2operator
    learning: issue-01
spec:
  instanceType: t3.micro
  amiId: ami-placeholder
  region: eu-central-1
  subnet: subnet-placeholder
  keyPair: not-ready-yet
  securityGroups:
    - sg-placeholder
  tags:
    Name: learning-sample
    ManagedBy: ec2-operator
  storage:
    rootVolume:
      size: 20
      type: gp3
      encrypted: true
