name: Learning AWS E2E

# Manual only — requires AWS credentials and prepared keypair/subnet/AMI.
on:
  workflow_dispatch:
    inputs:
      region:
        description: AWS region
        required: true
        default: eu-central-1
      img:
        description: Operator image (must be pullable by cluster)
        required: true
        default: ec2operator:aws-e2e

jobs:
  aws-e2e:
    name: Issues 12-14 — Real AWS E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/latest/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
          kind create cluster

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.region }}

      - name: Build sample manifest from secrets
        env:
          AWS_AMI_ID: ${{ secrets.AWS_AMI_ID }}
          AWS_KEY_PAIR: ${{ secrets.AWS_KEY_PAIR }}
          AWS_SUBNET_ID: ${{ secrets.AWS_SUBNET_ID }}
          AWS_SECURITY_GROUP_ID: ${{ secrets.AWS_SECURITY_GROUP_ID }}
        run: |
          test -n "$AWS_AMI_ID" && test -n "$AWS_KEY_PAIR" && test -n "$AWS_SUBNET_ID"
          sed -e "s|ami-REPLACE_ME|$AWS_AMI_ID|g" \
              -e "s|REPLACE_KEYPAIR|$AWS_KEY_PAIR|g" \
              -e "s|subnet-REPLACE_ME|$AWS_SUBNET_ID|g" \
              -e "s|sg-REPLACE_ME|${AWS_SECURITY_GROUP_ID}|g" \
              learning/M5-real-aws/issue-12-create-ec2/sample-aws.yaml > /tmp/sample-aws.yaml
          cat /tmp/sample-aws.yaml

      - name: Deploy operator
        env:
          USE_FAKE_EC2: "false"
          IMG: ${{ inputs.img }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ inputs.region }}
        run: |
          go mod tidy
          make docker-build IMG=$IMG
          kind load docker-image $IMG
          make install
          make deploy IMG=$IMG
          kubectl wait --for=condition=Available deployment/ec2operator-controller-manager \
            -n ec2operator-system --timeout=180s

      - name: Create EC2 via CR (Issue 12)
        run: |
          kubectl apply -f /tmp/sample-aws.yaml
          kubectl wait --for=jsonpath='{.status.instanceId}' ec2instance/web-server-learning-12 --timeout=600s || true
          kubectl get ec2instance web-server-learning-12 -o yaml

      - name: Delete EC2 via CR (Issue 13)
        if: always()
        run: |
          kubectl delete -f /tmp/sample-aws.yaml --ignore-not-found --wait=true
