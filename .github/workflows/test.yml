name: Tests

on:
  push:
  pull_request:

permissions: {}

jobs:
  test:
    permissions:
      contents: read
    name: Run on Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Run tests (envtest)
        run: |
          go mod tidy
          make setup-envtest
          make test

      - name: Test summary
        if: always()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          ## Tests

          - `make setup-envtest` — envtest binaries for local API server
          - `make test` — fmt, vet, generate, manifests, controller envtest

          Controller reconcile tests live in `internal/controller/`.
          EOF
